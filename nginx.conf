# Herd merges this into the site nginx config (see herd.laravel.com/docs).
# Long-lived caching for fingerprinted build assets and other static files.

location ~* ^/build/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

location ~* \.(?:css|js|mjs|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|webp|ico)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

location = /manifest.webmanifest {
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
}
